server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:32040/memory_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  type-aliases-package: com.ke.utopia.agent.memory.jdbc.entity
  configuration:
    map-underscore-to-camel-case: true

memory-agent:
  enabled: true
  storage-type: in-memory
  memory-char-limit: 2200
  summarization-message-threshold: 10
  summarize-on-session-close: true
  llm:
    api-key: xxx
    base-url: https://openapi-ait.ke.com/v1
    model: qwen-max
    max-tokens: 2000
    temperature: 0.3
    timeout-seconds: 60

logging:
  level:
    com.ke.utopia.agent: DEBUG
    org.springframework.web: DEBUG
